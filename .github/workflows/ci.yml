name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  backend:
    name: Backend (lint + typecheck + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: src/backend/requirements.txt

      - name: Install dependencies
        run: pip install -r src/backend/requirements.txt

      - name: Lint (ruff)
        run: ruff check src/backend

      - name: Format check (black)
        run: black --check src/backend

      - name: Typecheck (mypy)
        run: mypy src/backend --ignore-missing-imports

      - name: Test (pytest)
        env:
          ENVIRONMENT: test
          MONITORING_ENABLED: "false"
        run: pytest tests/backend -v --tb=short

  frontend:
    name: Frontend (lint + typecheck + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (eslint)
        run: npm run lint

      - name: Typecheck (tsc)
        run: npx tsc --noEmit

      - name: Test (vitest)
        run: npx vitest run
