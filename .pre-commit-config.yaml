# Pre-commit hooks for TreeBeard
# Install: pip install pre-commit && pre-commit install
# Run manually: pre-commit run --all-files

default_language_version:
  python: python3.11

repos:
  # ── Python: Ruff (lint + format) ──────────────────────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.6
    hooks:
      - id: ruff
        name: ruff lint
        args: [--fix, --exit-non-zero-on-fix]
        files: ^(src/backend/|tests/)
      - id: ruff-format
        name: ruff format
        files: ^(src/backend/|tests/)

  # ── Python: MyPy type checking ────────────────────────────────────────────
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.8.0
    hooks:
      - id: mypy
        name: mypy type check
        files: ^src/backend/
        args: [--config-file=pyproject.toml]
        additional_dependencies: [types-redis]
        pass_filenames: false

  # ── General file hygiene ──────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=500]

  # ── Frontend: ESLint + Prettier (local hooks via npm) ─────────────────────
  - repo: local
    hooks:
      - id: frontend-eslint
        name: eslint
        entry: bash -c 'for f in "$@"; do echo "${f#src/frontend/}"; done | xargs npx --prefix src/frontend eslint --ext ts,tsx --report-unused-disable-directives --max-warnings 0' --
        language: system
        files: ^src/frontend/src/.*\.(ts|tsx)$
        types: [file]
      - id: frontend-prettier
        name: prettier
        entry: bash -c 'for f in "$@"; do echo "${f#src/frontend/}"; done | xargs npx --prefix src/frontend prettier --check' --
        language: system
        files: ^src/frontend/src/.*\.(ts|tsx|css|json)$
        types: [file]
